name: Daily Dashboard Update

# Security note: this workflow uses no user-controlled input in run: steps.
# All github.* context values used (github.repository) are repository metadata,
# not untrusted external input (no issue/PR/comment bodies, no head refs).
# Secrets are passed only via env:, never interpolated into run: strings.
#
# NOTE: stats.nba.com blocks GitHub Actions datacenter IPs.
# Step 1 (NBA API fetch) always fails in CI -- this is expected and harmless.
# CI value: rebuilds dashboard JSONs from committed processed CSVs and deploys.

on:
  schedule:
    # 9:00 AM EST = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO: ${{ github.repository }}

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure runtime directories exist
        run: mkdir -p database data/odds data/processed data/raw data/features logs

      - name: Run test suite
        timeout-minutes: 5
        run: python -m pytest tests/ -q --tb=short --no-header

      - name: Fetch odds and run builders
        continue-on-error: true
        timeout-minutes: 10
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          VALUE_BET_THRESHOLD: '0.05'
        run: |
          python update.py --builders-only

      - name: Commit dashboard data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          git diff --quiet --cached || git commit -m "data: daily dashboard update $(date -u +'%Y-%m-%d')"

      - name: Push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
