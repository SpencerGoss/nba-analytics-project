name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure runtime directories exist
        run: mkdir -p database data/odds data/processed data/raw data/features logs

      - name: Run test suite
        timeout-minutes: 5
        run: python -m pytest tests/ -q --tb=short --no-header
