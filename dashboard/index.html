<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-hover: #252c35;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --win-bar: #238636;
    --lose-bar: #da3633;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 .logo {
    width: 28px;
    height: 28px;
    background: var(--accent-blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }

  .header-meta {
    font-size: 0.82rem;
    color: var(--text-secondary);
  }

  .header-meta .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    margin-right: 4px;
  }

  nav {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 0;
  }

  nav button {
    background: none;
    border: none;
    color: var(--text-secondary);
    padding: 12px 16px;
    font-size: 0.88rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  nav button:hover { color: var(--text-primary); }
  nav button.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent-blue);
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: var(--accent-blue); }

  .matchup {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .team {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .vs {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 400;
  }

  .prob-bar-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .prob-bar-label {
    font-size: 0.78rem;
    color: var(--text-secondary);
    width: 36px;
    text-align: right;
  }

  .prob-bar-track {
    flex: 1;
    height: 8px;
    background: var(--lose-bar);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .prob-bar-fill {
    height: 100%;
    background: var(--win-bar);
    border-radius: 4px 0 0 4px;
    transition: width 0.5s ease;
  }

  .prob-bar-pct {
    font-size: 0.78rem;
    color: var(--text-secondary);
    width: 36px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-ats {
    background: rgba(88,166,255,0.15);
    color: var(--accent-blue);
    border: 1px solid rgba(88,166,255,0.3);
  }

  .badge-value {
    background: rgba(63,185,80,0.15);
    color: var(--accent-green);
    border: 1px solid rgba(63,185,80,0.3);
  }

  .badge-winner {
    background: rgba(210,153,34,0.15);
    color: var(--accent-orange);
    border: 1px solid rgba(210,153,34,0.3);
  }

  .badge-edge {
    background: rgba(188,140,255,0.15);
    color: var(--accent-purple);
    border: 1px solid rgba(188,140,255,0.3);
  }

  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
    position: relative;
    height: 380px;
  }

  .table-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg-secondary);
    padding: 12px 16px;
    text-align: left;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 12px 16px;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:hover { background: var(--bg-hover); }
  tbody tr:last-child td { border-bottom: none; }

  .edge-positive { color: var(--accent-green); font-weight: 600; }

  .search-box {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .search-box input {
    flex: 1;
    max-width: 400px;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box input:focus { border-color: var(--accent-blue); }
  .search-box input::placeholder { color: var(--text-muted); }

  .player-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .player-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .player-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .player-team {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  .stat-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent-blue);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state p {
    font-size: 1rem;
    max-width: 400px;
    margin: 0 auto;
  }

  .stats-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: center;
  }

  .big-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-blue);
  }

  .big-label {
    font-size: 0.78rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  @media (max-width: 768px) {
    .card-grid { grid-template-columns: 1fr; }
    .player-cards { grid-template-columns: 1fr; }
    .stats-summary { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; gap: 8px; }
    nav { overflow-x: auto; }
  }
</style>
</head>
<body>

<header>
  <h1>
    <span class="logo">A</span>
    NBA Analytics Dashboard
  </h1>
  <div class="header-meta">
    <span class="status-dot" id="statusDot"></span>
    <span id="lastUpdated">Loading...</span>
  </div>
</header>

<nav id="tabNav">
  <button class="active" data-tab="picks">Today's Picks</button>
  <button data-tab="accuracy">Model Accuracy</button>
  <button data-tab="value">Value Bets</button>
  <button data-tab="players">Player Lookup</button>
</nav>

<main>
  <div id="tab-picks" class="tab-content active">
    <div class="stats-summary" id="picksSummary"></div>
    <h2 class="section-title">Game Predictions</h2>
    <div class="card-grid" id="picksGrid"></div>
  </div>

  <div id="tab-accuracy" class="tab-content">
    <div class="stats-summary" id="accuracySummary"></div>
    <h2 class="section-title">Rolling Accuracy Over Time</h2>
    <div class="chart-container">
      <canvas id="accuracyChart"></canvas>
    </div>
  </div>

  <div id="tab-value" class="tab-content">
    <h2 class="section-title">Recent Value Bet Alerts</h2>
    <div class="table-container" id="valueBetsContainer"></div>
  </div>

  <div id="tab-players" class="tab-content">
    <h2 class="section-title">Player Projections</h2>
    <div class="search-box">
      <input type="text" id="playerSearch" placeholder="Search player name (e.g. LeBron James)..." />
    </div>
    <div class="player-cards" id="playerCards"></div>
  </div>
</main>

<script>
(function() {
  'use strict';

  var picksData = [];
  var accuracyData = [];
  var valueBetsData = [];
  var playerData = [];
  var accuracyChart = null;

  /* --- Utility: escape text for safe DOM insertion --- */
  function esc(str) {
    if (str == null) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  /* --- DOM building helpers using safe DOM API --- */
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'className') node.className = attrs[k];
        else if (k === 'textContent') node.textContent = attrs[k];
        else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
        else node.setAttribute(k, attrs[k]);
      });
    }
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  function clearNode(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  /* --- Tabs --- */
  var tabNav = document.getElementById('tabNav');
  tabNav.addEventListener('click', function(e) {
    if (e.target.tagName !== 'BUTTON') return;
    tabNav.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + e.target.dataset.tab).classList.add('active');
    if (e.target.dataset.tab === 'accuracy' && accuracyChart) {
      accuracyChart.resize();
    }
  });

  /* --- Data Loading --- */
  async function fetchJSON(file) {
    try {
      var resp = await fetch('data/' + file + '?t=' + Date.now());
      if (!resp.ok) return [];
      var data = await resp.json();
      return Array.isArray(data) ? data : [];
    } catch (e) {
      return [];
    }
  }

  async function loadAll() {
    var results = await Promise.all([
      fetchJSON('todays_picks.json'),
      fetchJSON('accuracy_history.json'),
      fetchJSON('value_bets.json'),
      fetchJSON('player_predictions.json'),
    ]);

    picksData = results[0];
    accuracyData = results[1];
    valueBetsData = results[2];
    playerData = results[3];

    var metaObj = {};
    try {
      var resp = await fetch('data/meta.json?t=' + Date.now());
      if (resp.ok) metaObj = await resp.json();
    } catch(e) {}

    var statusDot = document.getElementById('statusDot');
    var lastUpdated = document.getElementById('lastUpdated');
    if (metaObj.exported_at) {
      var d = new Date(metaObj.exported_at + 'Z');
      lastUpdated.textContent = 'Updated: ' + d.toLocaleString();
      statusDot.style.background = metaObj.sample_data ? 'var(--accent-orange)' : 'var(--accent-green)';
      if (metaObj.sample_data) {
        lastUpdated.textContent += ' (Sample Data)';
      }
    } else {
      lastUpdated.textContent = 'No data available';
      statusDot.style.background = 'var(--accent-red)';
    }

    renderPicks();
    renderAccuracy();
    renderValueBets();
    renderPlayers('');
  }

  /* --- Empty state builder --- */
  function emptyStateNode(msg) {
    return el('div', {className: 'empty-state'}, [
      el('p', {textContent: msg})
    ]);
  }

  /* --- Summary card builder --- */
  function summaryCardNode(value, label) {
    return el('div', {className: 'stat-summary-card'}, [
      el('div', {className: 'big-number', textContent: String(value)}),
      el('div', {className: 'big-label', textContent: label}),
    ]);
  }

  /* --- Render: Picks --- */
  function renderPicks() {
    var grid = document.getElementById('picksGrid');
    var summary = document.getElementById('picksSummary');
    clearNode(grid);
    clearNode(summary);

    if (picksData.length === 0) {
      grid.appendChild(emptyStateNode('No predictions available for today.'));
      return;
    }

    var totalGames = picksData.length;
    var valueBets = picksData.filter(function(p) { return p.value_bet; }).length;
    var avgConf = picksData.reduce(function(s, p) { return s + Math.max(p.home_win_prob, p.away_win_prob); }, 0) / totalGames;

    summary.appendChild(summaryCardNode(totalGames, 'Games Today'));
    summary.appendChild(summaryCardNode(valueBets, 'Value Bets'));
    summary.appendChild(summaryCardNode((avgConf * 100).toFixed(1) + '%', 'Avg Confidence'));

    picksData.forEach(function(p) {
      var homePct = (p.home_win_prob * 100).toFixed(1);
      var awayPct = (p.away_win_prob * 100).toFixed(1);
      var homeTeamName = p.home_team_name || p.home_team;
      var awayTeamName = p.away_team_name || p.away_team;
      var spreadStr = p.spread != null ? (p.spread > 0 ? '+' + p.spread : String(p.spread)) : '';

      var card = el('div', {className: 'card'});

      /* Matchup header */
      var matchup = el('div', {className: 'matchup'}, [
        el('span', {className: 'team', textContent: p.home_team}),
        el('span', {className: 'vs', textContent: 'vs'}),
        el('span', {className: 'team', textContent: p.away_team}),
      ]);
      card.appendChild(matchup);

      /* Full team names */
      card.appendChild(el('div', {style: 'font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px', textContent: homeTeamName + ' vs ' + awayTeamName}));

      /* Home prob bar */
      var homeFill = el('div', {className: 'prob-bar-fill'});
      homeFill.style.width = homePct + '%';
      card.appendChild(el('div', {className: 'prob-bar-container'}, [
        el('span', {className: 'prob-bar-label', textContent: p.home_team}),
        el('div', {className: 'prob-bar-track'}, [homeFill]),
        el('span', {className: 'prob-bar-pct', textContent: homePct + '%'}),
      ]));

      /* Away prob bar */
      var awayFill = el('div', {className: 'prob-bar-fill'});
      awayFill.style.width = awayPct + '%';
      awayFill.style.background = 'var(--accent-blue)';
      card.appendChild(el('div', {className: 'prob-bar-container'}, [
        el('span', {className: 'prob-bar-label', textContent: p.away_team}),
        el('div', {className: 'prob-bar-track'}, [awayFill]),
        el('span', {className: 'prob-bar-pct', textContent: awayPct + '%'}),
      ]));

      /* Badges */
      var meta = el('div', {className: 'card-meta'});
      meta.appendChild(el('span', {className: 'badge badge-winner', textContent: 'Pick: ' + p.predicted_winner}));
      if (p.ats_pick) {
        var atsText = 'ATS: ' + p.ats_pick + (spreadStr ? ' (' + spreadStr + ')' : '');
        meta.appendChild(el('span', {className: 'badge badge-ats', textContent: atsText}));
      }
      if (p.value_bet) {
        var edgeStr = p.edge_pct != null ? ' +' + (p.edge_pct * 100).toFixed(1) + '%' : '';
        meta.appendChild(el('span', {className: 'badge badge-value', textContent: 'Value Bet' + edgeStr}));
      }
      card.appendChild(meta);

      grid.appendChild(card);
    });
  }

  /* --- Render: Accuracy --- */
  function renderAccuracy() {
    var summary = document.getElementById('accuracySummary');
    var ctx = document.getElementById('accuracyChart');
    clearNode(summary);

    if (accuracyData.length === 0) {
      summary.appendChild(emptyStateNode('No accuracy data available yet.'));
      return;
    }

    var last = accuracyData[accuracyData.length - 1];
    var totalGames = last.cumulative_games;
    var rollingAcc = (last.rolling_accuracy * 100).toFixed(1) + '%';
    var recent7 = accuracyData.slice(-7);
    var r7correct = recent7.reduce(function(s, r) { return s + r.correct; }, 0);
    var r7total = recent7.reduce(function(s, r) { return s + r.games; }, 0);
    var recent7Acc = r7total > 0 ? r7correct / r7total : 0;

    summary.appendChild(summaryCardNode(rollingAcc, 'Overall Accuracy'));
    summary.appendChild(summaryCardNode(totalGames, 'Total Predictions'));
    summary.appendChild(summaryCardNode((recent7Acc * 100).toFixed(1) + '%', 'Last 7 Days'));

    var labels = accuracyData.map(function(d) { return d.date; });
    var rolling = accuracyData.map(function(d) { return d.rolling_accuracy * 100; });
    var daily = accuracyData.map(function(d) { return d.daily_accuracy * 100; });
    var baseline = accuracyData.map(function() { return 66.8; });

    if (accuracyChart) accuracyChart.destroy();

    accuracyChart = new Chart(ctx.getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Rolling Accuracy',
            data: rolling,
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
            borderWidth: 2,
          },
          {
            label: 'Daily Accuracy',
            data: daily,
            borderColor: 'rgba(139,148,158,0.4)',
            backgroundColor: 'transparent',
            borderDash: [4, 4],
            tension: 0.1,
            pointRadius: 1,
            borderWidth: 1,
          },
          {
            label: 'Baseline (66.8%)',
            data: baseline,
            borderColor: '#d29922',
            backgroundColor: 'transparent',
            borderDash: [8, 4],
            pointRadius: 0,
            borderWidth: 1.5,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            grid: { color: 'rgba(48,54,61,0.5)' },
            ticks: { color: '#8b949e', maxTicksLimit: 12, maxRotation: 45 },
          },
          y: {
            min: 40,
            max: 100,
            grid: { color: 'rgba(48,54,61,0.5)' },
            ticks: {
              color: '#8b949e',
              callback: function(v) { return v + '%'; },
            },
          },
        },
        plugins: {
          legend: {
            labels: { color: '#e6edf3', usePointStyle: true },
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + '%';
              },
            },
          },
        },
      },
    });
  }

  /* --- Render: Value Bets --- */
  function renderValueBets() {
    var container = document.getElementById('valueBetsContainer');
    clearNode(container);

    if (valueBetsData.length === 0) {
      container.appendChild(emptyStateNode('No value bets detected recently.'));
      return;
    }

    var table = el('table');
    var thead = el('thead');
    var headerRow = el('tr');
    ['Date', 'Game', 'Model Prob', 'Market Prob', 'Edge', 'Side'].forEach(function(h) {
      headerRow.appendChild(el('th', {textContent: h}));
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = el('tbody');
    valueBetsData.forEach(function(b) {
      var row = el('tr');
      row.appendChild(el('td', {textContent: b.game_date || '-'}));
      row.appendChild(el('td', {textContent: b.home_team + ' vs ' + b.away_team}));
      row.appendChild(el('td', {textContent: b.model_prob != null ? (b.model_prob * 100).toFixed(1) + '%' : 'N/A'}));
      row.appendChild(el('td', {textContent: b.market_prob != null ? (b.market_prob * 100).toFixed(1) + '%' : 'N/A'}));

      var edgePct = b.edge_pct != null ? (b.edge_pct * 100).toFixed(1) : 'N/A';
      var edgeTd = el('td', {textContent: '+' + edgePct + '%'});
      if (b.edge_pct != null && b.edge_pct > 0) edgeTd.className = 'edge-positive';
      row.appendChild(edgeTd);

      row.appendChild(el('td', null, [el('span', {className: 'badge badge-edge', textContent: b.recommended_side || '-'})]));
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  /* --- Render: Players --- */
  function renderPlayers(query) {
    var container = document.getElementById('playerCards');
    clearNode(container);

    if (playerData.length === 0) {
      container.appendChild(emptyStateNode('No player predictions available.'));
      return;
    }

    var q = query.toLowerCase().trim();
    var filtered = q
      ? playerData.filter(function(p) { return p.player_name.toLowerCase().indexOf(q) !== -1; })
      : playerData;

    if (filtered.length === 0) {
      container.appendChild(emptyStateNode('No players match "' + query + '".'));
      return;
    }

    filtered.forEach(function(p) {
      var teamName = p.team_name || p.team;
      var oppName = p.opponent_name || p.opponent;
      var pts = p.pts != null ? p.pts.toFixed(1) : '-';
      var reb = p.reb != null ? p.reb.toFixed(1) : '-';
      var ast = p.ast != null ? p.ast.toFixed(1) : '-';

      var card = el('div', {className: 'player-card'}, [
        el('div', {className: 'player-name', textContent: p.player_name}),
        el('div', {className: 'player-team', textContent: teamName + ' vs ' + oppName}),
        el('div', {className: 'stat-row'}, [
          el('div', {className: 'stat-item'}, [
            el('div', {className: 'stat-value', textContent: pts}),
            el('div', {className: 'stat-label', textContent: 'PTS'}),
          ]),
          el('div', {className: 'stat-item'}, [
            el('div', {className: 'stat-value', textContent: reb}),
            el('div', {className: 'stat-label', textContent: 'REB'}),
          ]),
          el('div', {className: 'stat-item'}, [
            el('div', {className: 'stat-value', textContent: ast}),
            el('div', {className: 'stat-label', textContent: 'AST'}),
          ]),
        ]),
      ]);
      container.appendChild(card);
    });
  }

  /* --- Player search --- */
  document.getElementById('playerSearch').addEventListener('input', function(e) {
    renderPlayers(e.target.value);
  });

  /* --- Init --- */
  loadAll();
})();
</script>

</body>
</html>
